version: '2'
services:
  proxy_pool:
    build: .
    container_name: proxy_pool
    ports:
      - "5010:5010"
    links:
      - proxy_redis
    environment:
      DB_CONN: "redis://@proxy_redis:6379/0"
      # 可通过 PROXY_POOL_CONFIG 指定 YAML 配置文件路径
      # 需配合 volumes 挂载配置文件，例如：
      # PROXY_POOL_CONFIG: "/etc/proxy-pool/config.yaml"
    # volumes:
    #   - ./config.yaml:/etc/proxy-pool/config.yaml:ro
  proxy_redis:
    image: "redis"
    container_name: proxy_redis
